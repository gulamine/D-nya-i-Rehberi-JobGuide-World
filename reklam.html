<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reklam Ver</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f5f5f5;
}

nav{
    background:black;
    color:white;
    padding:15px;
}

nav a{
    color:white;
    margin-right:15px;
    text-decoration:none;
}

.container{
    max-width:500px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
}

input, select, textarea, button{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
    border:none;
}

button:hover{
    background:#0ea5e9;
}
@media (max-width:600px){
    nav{
        flex-direction:column;
        align-items:flex-start;
    }

    nav a{
        font-size:10px;
    }
    .table th, .table td{
        font-size:12px;
        padding:6px;
    }

    #loginBox{
        padding:20px 15px;
    }
    }
</style>
</head>

<body>

<nav>
   <a href="index.html">Ana Sayfa/ Home</a>
    <a href="isletmeler.html">İsletmeler/Businesses</a>
     <a href="reklam.html">Reklam Ver/Advertise</a> 
     <a href="İletişim.html">İletişim/ Contact</a> 
     <a href="bilboardPanel.html">bilboardPanel/</a>
      <a href="admin.html">Admin Panel</a> </nav>
</nav>
<div class="container">
    <h2>Reklam Ver</h2>
    <form id="reklamForm">
        <input type="text" id="isim" placeholder="İsletme İsmi" required>
        <select id="kategori" required>
            <option value="">Kategori Seçin</option>
            <option value="Restoranlar">Restoranlar</option>
            <option value="Kafeler">Kafeler</option>
            <option value="Kuaförler">Kuaförler</option>
            <option value="Emlak">Emlak</option>
            <option value="Otel,Motel,Apart">Otel,Motel,Apart</option>
            <option value="Tekne Turları">Tekne Turları</option>
            <option value="İnsaat Fİrması">İnsaat Fİrması</option>
            <option value="Yardım Kuruluşlar">Yardım Kuruluşlar</option>
            <option value="Diğerleri">Diğerleri</option>
        </select>
        <input type="text" id="link" placeholder="Web Site Linki (https://)">
<input type="text" id="instagram" placeholder="Instagram Linki (https://)">
<textarea id="aciklama" placeholder="Açıklama" required></textarea>
<button type="submit">Gönder</button>

<script>
document.getElementById("reklamForm").addEventListener("submit", function(e){
    e.preventDefault(); // 🔥 çok önemli

    let link = document.getElementById("link").value.trim();
    let instagram = document.getElementById("instagram").value.trim();

    // 🔥 https düzeltme (ikisi için)
    if(link !== "" && !link.startsWith("http")){
        link = "https://" + link;
    }

    if(instagram !== "" && !instagram.startsWith("http")){
        instagram = "https://" + instagram;
    }

    // 🔥 en az 1 zorunlu
    if(link === "" && instagram === ""){
        alert("Lütfen en az web sitesi veya Instagram giriniz!");
        return;
    }

    const isletme = {
        isim: document.getElementById("isim").value,
        kategori: document.getElementById("kategori").value,
        link: link,               // 🔥 düzeltildi
        instagram: instagram,     // 🔥 düzeltildi
        aciklama: document.getElementById("aciklama").value
    };

    // 🔥 localStorage kaydet
    let eski = JSON.parse(localStorage.getItem("isletmeler")) || [];
    eski.push(isletme);
    localStorage.setItem("isletmeler", JSON.stringify(eski));

    console.log("Yeni Reklam:", isletme);
    alert("Başarıyla eklendi!");

    this.reset();
});
</script>
</body> </html>
