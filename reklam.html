<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;

    background:#f5f5f5;
}

nav{
    background:rgb(18, 28, 97);

.container h2{
    text-align:center;

}

input, select, textarea, button{
    width:100%;

    margin:10px 0;

button{
    background:#0fb364;
    color:black;

</head>

<body>

<nav>
   <a href="index.html">Ana Sayfa/ Home</a>
    <a href="isletmeler.html">İsletmeler/Businesses</a>
     <a href="reklam.html">Reklam Ver/Advertise</a> 
      <a href="bilboardPanel.html">bilboardPanel/</a>
     <a href="İletişim.html">İletişim/ Contact</a> 
    
</nav>
<div class="container">
    <h2>Reklam Ver</h2>
    <form id="reklamForm">
        <input type="text" id="isim" placeholder="İsletme İsmi" required>
        <select id="kategori" required>
            <option value="">Kategori Seçin</option>
            <option value="Restoranlar">Restoranlar</option>
            <option value="Kafeler">Kafeler</option>
            <option value="Kuaförler">Kuaförler</option>
            <option value="Emlak">Emlak</option>
            <option value="Otel,Motel,Apart">Otel,Motel,Apart</option>
            <option value="Tekne Turları">Tekne Turları</option>
            <option value="İnsaat Fİrması">İnsaat Fİrması</option>
            <option value="Yardım Kuruluşlar">Yardım Kuruluşlar</option>
            <option value="Aliş Veriş Mağzaları ">Aliş Veriş Mağzaları</option>
            <option value="Camp Alanları ">Camp Alanları</option>
            <option value="Spor Merkezleri ">Spor Merkezleri</option>
            <option value="Veteriner Klinikleri ">Veteriner Klinikleri</option>
            <option value="Seyhat Acentasi ">Seyhat Acentasi</option>
            <option value="Özel Sigorta ">Özel Sigorta</option>
            <option value="En Uygun Araç Kiralama">En Uygun Araç Kiralama</option>
            <option value="Klinikler ">Özel Sigorta</option>
            <option value="Özel Okullar ">Özel Okullar</option>
            <option value="Diğerleri">Diğerleri</option>

        </select>
        <select id="paket" required>
    <option value="">Reklam Paketi Seç</option>
    <option value="200₺ - Normal">🟢 Normal (200₺)</option>
    <option value="400₺ - Öne Çıkan">🔥 Öne Çıkan (400₺)</option>
    <option value="600₺ - VIP">👑 VIP (600₺)</option>
</select>
        <input type="text" id="link" placeholder="Web Site Linki (https://)">
<input type="text" id="instagram" placeholder="Instagram Linki (https://)">
<textarea id="aciklama" placeholder="Açıklama" required></textarea>
<button type="submit">Gönder</button>

<script>
document.getElementById("reklamForm").addEventListener("submit", function(e){
    e.preventDefault();

    let isim = document.getElementById("isim").value;
    let kategori = document.getElementById("kategori").value;
    let link = document.getElementById("link").value.trim();
    let instagram = document.getElementById("instagram").value.trim();
    let aciklama = document.getElementById("aciklama").value;

    // https düzeltme
    if(link !== "" && !link.startsWith("http")){
        link = "https://" + link;
    }

    if(instagram !== "" && !instagram.startsWith("http")){
        instagram = "https://" + instagram;
    }

    if(link === "" && instagram === ""){
        alert("En az bir iletişim gir!");
        return;
    }
    if(paket === ""){
        alert("Lütfen paket seç!");
        return;
    }

    // 🔥 SPAM KORUMA (60 saniye)
    let sonGonderim = localStorage.getItem("sonGonderim");
    let simdi = Date.now();

    if(sonGonderim && (simdi - sonGonderim < 60000)){
        alert("Çok hızlı gönderiyorsun! 1 dakika bekle.");
        return;
    }

    localStorage.setItem("sonGonderim", simdi);

    // 🔥 MESAJ
    let mesaj = `📢 Yeni Reklam Talebi
İşletme: ${isim}
Kategori: ${kategori}
Web: ${link}
Instagram: ${instagram}
Açıklama: ${aciklama}
Tarih: ${new Date().toLocaleString()}
⏳ Yayın Süresi: 30 Gün
📌 Süre bitince kaldırılır.
💰 Ödeme sonrası reklam yayına alınır.`;


    // 🔥 NUMARA
    let telefon = "905384450648";

    let url = `https://wa.me/${telefon}?text=${encodeURIComponent(mesaj)}`;

    // 🔥 GİZLİ KAYIT (senin tarayıcıda)
    let kayitlar = JSON.parse(localStorage.getItem("basvurular")) || [];
    kayitlar.push({
        isim,
        kategori,
        link,
        instagram,
        aciklama,
        tarih: new Date().toLocaleString()
    });
    localStorage.setItem("basvurular", JSON.stringify(kayitlar));

    // WhatsApp aç
    window.open(url, "_blank");

    this.reset();
});
</script>
</body> </html>
