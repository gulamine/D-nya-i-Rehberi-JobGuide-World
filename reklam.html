<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reklam Ver</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f5f5f5;
}

nav{
    background:black;
    color:white;
    padding:15px;
}

nav a{
    color:white;
    margin-right:15px;
    text-decoration:none;
}

.container{
    max-width:500px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
}

input, select, textarea, button{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
    border:none;
}

button:hover{
    background:#0ea5e9;
}
@media (max-width:600px){
    nav{
        flex-direction:column;
        align-items:flex-start;
    }

    nav a{
        font-size:13px;
    }
    .table th, .table td{
        font-size:12px;
        padding:6px;
    }

    #loginBox{
        padding:20px 15px;
    }
    }
</style>
</head>

<body>

<nav>
    <a href="index.html">Ana Sayfa</a>
    <a href="isletmeler.html">İşletmeler</a>
    <a href="reklam.html">Reklam Ver</a>
     <a href="bilboardPanel.html">bilboardPanel/</a>
    <a href="iletisim.html">İletişim</a>

</nav>

<div class="container">
    <h2>Reklam Ver</h2>
    <form id="reklamForm">
        <input type="text" id="isim" placeholder="İşletme İsmi" required>
        <select id="kategori" required>
            <option value="">Kategori Seçin</option>
            <option value="Restoran">Restoran</option>
            <option value="Kuaför">Kuaför</option>
            <option value="Emlak">Emlak</option>
            <option value="Otel">Otel</option>
            <option value="Tekne">Tekne</option>
        </select>
        <input type="text" id="link" placeholder="Web Site Linki (https://)" required>
        <textarea id="aciklama" placeholder="Açıklama" required></textarea>
        <button type="submit">Gönder</button>
    </form>
</div>

<script>
// Şimdilik sadece tarayıcıda gösteriyoruz
document.getElementById("reklamForm").addEventListener("submit", function(e){
    e.preventDefault();

    const isletme = {
        isim: document.getElementById("isim").value,
        kategori: document.getElementById("kategori").value,
        link: document.getElementById("link").value,
        aciklama: document.getElementById("aciklama").value
    };

    console.log("Yeni Reklam Verildi:", isletme);
    alert("Form gönderildi! Admin panelden kontrol edebilirsiniz.");

    // Formu temizle
    document.getElementById("reklamForm").reset();
});
</script>

</body>
</html>
