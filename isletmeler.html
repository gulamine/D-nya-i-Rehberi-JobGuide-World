<!DOCTYPE html>

<title>İsletmeler</title>

<style>
body{

    margin:0;
    background:#f5f5f5;

nav{

}

nav a{
    color:white;

.controls{

}

input, select{

}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}
@media (max-width:600px){
    nav{
        flex-direction:column;
        align-items:flex-start;
    }

    nav a{

    }
    .table th, .table td{
        font-size:12px;
        padding:6px;
    }

    }
    }
