<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İşletmeler</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f5f5f5;
}

nav{
    background:black;
    color:white;
    padding:15px;
}

nav a{
    color:white;
    margin-right:15px;
    text-decoration:none;
}

.controls{
    padding:20px;
    text-align:center;
}

input, select{
    padding:10px;
    margin:10px;
    width:200px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card a{
    text-decoration:none;
    font-weight:bold;
    color:blue;
}

@media (max-width:600px){
    nav{
        flex-direction:column;
        align-items:flex-start;
    }

    nav a{
        font-size:10px;
    }
}
</style>
</head>

<body>

<nav>
   <a href="index.html">Ana Sayfa</a>
   <a href="isletmeler.html">İşletmeler</a>
   <a href="reklam.html">Reklam Ver</a>
   <a href="İletişim.html">İletişim</a>
   <a href="admin.html">Admin</a>
</nav>

<div class="controls">
    <input type="text" id="search" placeholder="İşletme ara...">

    <select id="category">
        <option value="">Tüm Kategoriler</option>
        <option value="Restoranlar">Restoranlar</option>
        <option value="Kuaförler">Kuaförler</option>
        <option value="Emlak">Emlak</option>
        <option value="Otel,Motel,Apart">Otel,Motel,Apart</option>
        <option value="Tekne Turları">Tekne Turları</option>
        <option value="Kafeler">Kafeler</option>
        <option value="İnşaat Fİrması">İnşaat Fİrması</option>
        <option value="Yardım Kuruluşlar">Yardım Kuruluşlar</option>
        <option value="Diğerleri">Diğerleri</option>
    </select>
</div>

<div class="cards" id="cards"></div>

<script>

const isletmeler = [
    {
        isim:"Bilal Gülmez",
        kategori:"Diğerleri",
        aciklama:"camiler dernegi başkanı",
        link:"https://example.com",
        instagram:"https://www.instagram.com/gulbilal06/"
    },
    {
        isim:"Merkez Camileri Derneği",
        kategori:"Yardım Kurulışları",
        aciklama:"hizmet",
        link:"",
        instagram:"https://www.instagram.com/merkezcamileri/"
          },
    {
        isim:"Restorant Pitaland",
        kategori:"Restoranlar",
        aciklama:"Orta Doğu Tat",
        link:"https://www.pitaland.ca",
        instagram:"https://www.instagram.com/pitaland.ca"
    },
    {
        isim:"Mabel Emlak",
        kategori:"Emlak",
        aciklama:"Kiralık ve satılık ilanlar",
        link:"http://www.Mabelmarmaris.com",
        instagram:"https://www.instagram.com/mabelmarmaris"
    },
    {
        isim:"Mavi Otel",
        kategori:"Otel,Motel,Apart",
        aciklama:"Deniz manzaralı otel",
        link:"",
        instagram:"https://instagram.com"
    },
    {
        isim:"Hercules Tekne",
        kategori:"Tekne Turları",
        aciklama:"Marmaris tekne turu",
        link:"https://www.herculesmarmaris.com",
        instagram:"https://instagram.com"
    },
   ]; // 🔥 EKLEDİĞİM SATIR localStorage.setItem("isletmeler", JSON.stringify(isletmeler));

const cards = document.getElementById("cards");
const search = document.getElementById("search");
const category = document.getElementById("category");

// 🔥 KART GÖSTER
function goster(liste){
    cards.innerHTML = "";

    liste.forEach(item=>{
        cards.innerHTML += `
        <div class="card">
            <h3>${item.isim}</h3>
            <p>${item.aciklama}</p>
            <small>${item.kategori}</small>

            <div style="margin-top:10px;">
                ${item.link ? `<a href="${item.link}" target="_blank">🌐 Web</a>` : ""}
                ${item.instagram ? ` | <a href="${item.instagram}" target="_blank">📸 Instagram</a>` : ""}
            </div>
        </div>
        `;
    });
}

// 🔥 FİLTRE
function filtrele(){
    let aranan = search.value.toLowerCase();
    let secilen = category.value;

    let sonuc = isletmeler.filter(item=>{
        return (
            item.isim.toLowerCase().includes(aranan) &&
            (secilen === "" || item.kategori === secilen)
        );
    });

    goster(sonuc);
}

// 🔥 EVENTLER
search.addEventListener("input", filtrele);
category.addEventListener("change", filtrele);

// 🔥 İLK AÇILIŞ
goster(isletmeler);

</script>

</body>
</html>
